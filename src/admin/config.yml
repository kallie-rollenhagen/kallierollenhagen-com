backend:
    name: github
    repo: kallie-rollenhagen/kallierollenhagen-com
    branch: main
    base_url: https://decap-proxy.hallenj.workers.dev
    auth_endpoint: /auth

media_folder: "src/assets/images/"
public_folder: "/assets/images/"

gallery_field: &gallery_field
  label: Gallery
  name: gallery
  widget: object
  fields:
    - label: Gallery Type
      name: type
      widget: select
      options:
        - grid
        - masonry

    - label: Lightbox
      name: lightbox
      widget: boolean
      default: false

    - label: Rows
      name: rows
      widget: list
      fields:
        - label: Row
          name: row
          widget: object
          fields:
            - label: Elements
              name: elements
              widget: list
              fields:
                - label: Element Type
                  name: type
                  widget: select
                  options:
                    - image
                    - text

                - label: Image File
                  name: file
                  widget: image
                  required: false

                - label: Alt Text
                  name: alt
                  widget: string
                  required: false

                - label: Caption
                  name: caption
                  widget: string
                  required: false

                - label: Text Content
                  name: text
                  widget: text
                  required: false

collections:

  - name: "projects"
    label: "Design Projects"
    folder: "src/content/design/"
    create: true
    format: njk
    extension: njk
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - label: "Credits"
        name: "credits"
        widget: "list"
        fields:
          - {label: "Role", name: "role", widget: "string"}
          - {label: "Person", name: "person", widget: "string"}
      - {label: "Project Description", name: "project_description", widget: "text"}
      - label: "Main Image"
        name: "main_image"
        widget: "object"
        fields:
          - {label: "File", name: "file", widget: "image"}
          - {label: "Alt Text", name: "alt", widget: "string"}
      - label: "Secondary Side Image"
        name: "side_image"
        widget: "object"
        fields:
          - {label: "File", name: "file", widget: "image"}
          - {label: "Alt Text", name: "alt", widget: "string"}
      - label: "Gallery"
        name: "gallery"
        widget: "list"
        fields:
          - label: "Layout"
            name: "layout"
            widget: "select"
            options:
              - { label: "Left Wide (2/3 + 1/3)", value: "left-wide" }
              - { label: "Right Wide (1/3 + 2/3)", value: "right-wide" }
              - { label: "Thirds (1/3 + 1/3 + 1/3)", value: "thirds" }
              - { label: "Full Width (3/3)", value: "full-width" }
          - label: "Elements"
            name: "elements"
            widget: "list"
            types:
              - label: "Image"
                name: "image"
                widget: "object"
                fields:
                  - { label: "File", name: "file", widget: "image" }
                  - { label: "Alt Text", name: "alt", widget: "string" }
              - label: "Text"
                name: "text"
                widget: "object"
                fields:
                  - { label: "Text", name: "text", widget: "text" }
      - {label: "Template", name: "body", widget: "markdown"}
      
  - name: art
    label: Art
    format: njk
    files:
      - label: Art
        name: art
        file: "src/content/art.njk"
        fields:
          - { label: Title, name: title, widget: string }
          - { label: "Permalink", name: "permalink", widget: "string" }
          # - label: "Images"
          #   name: "images"
          #   widget: "list"
          #   fields:
          #     - {label: "File", name: "file", widget: "image"}
          #     - {label: "Position", name: "position", widget: "select", options: ["full-photo", "half-photo-left", "half-photo-right"]}
          #     - {label: "Alt Text", name: "alt", widget: "string"}
          - *gallery_field
          - {label: "Template", name: "body", widget: "markdown"}

  - name: photography
    label: Photography
    format: njk
    files:
      - label: Photography
        name: photography
        file: src/content/photography.njk
        fields:
          - { label: Title, name: title, widget: string }
          - { label: "Permalink", name: "permalink", widget: "string" }
          - *gallery_field
          - { label: "Template", name: "body", widget: "markdown" }