backend:
    name: git-gateway

media_folder: "/images/"

collections:
  - name: "art"
    label: "Art Page"
    files:
      - label: "Art Page"
        name: "art"
        file: "src/content/art.njk"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }