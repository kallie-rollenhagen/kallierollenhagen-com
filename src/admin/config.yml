backend:
    name: git-gateway

media_folder: "src/assets/images/"
public_folder: "/assets/images/"

collections:
  - name: "art"
    label: "Art Page"
    files:
      - label: "Art"
        format: frontmatter
        name: "art"
        file: "src/content/art.njk"
        fields:
          - { label: "Title", name: "title", widget: "string" }
  - name: test
    label: Test
    files:
      - label: Test
        name: test
        file: src/content/test.md
        fields:
          - { label: Title, name: title, widget: string }