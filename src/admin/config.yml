backend:
    name: git-gateway

media_folder: "src/assets/images/"

collections:
  - name: "art"
    label: "Art Page"
    format: frontmatter
    files:
      - label: "Art Page"
        name: "art"
        file: "src/content/art.njk"
        fields:
          - { label: "Title", name: "title", widget: "string" }